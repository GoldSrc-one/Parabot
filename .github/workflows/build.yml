name: Build
permissions:
  contents: write

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'

  pull_request:
    types: [opened, reopened, synchronize]
  release:
    types: [published]

jobs:
  windows:
    name: 'Windows'
    runs-on: windows-2022

    steps:
      - name: Configure
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17'

      - name: Build
        run: |
          msbuild Parabot.sln -p:Configuration=Release /t:Build

      - name: Create zip
        run: |
          Copy-Item Release\Parabot.dll addons\parabot\dlls\parabot.dll
          Copy-Item Release\Parabot.pdb addons\parabot\dlls\parabot.pdb
          Compress-Archive -Path addons -Destination addons.zip

      - name: Deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win32
          path: |
            addons.zip

  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    needs: [windows]

    steps:
      - name: Deploying windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win32

      - name: Publish artifacts
        uses: softprops/action-gh-release@v2
        id: publish-job
        if: |
          startsWith(github.ref, 'refs/tags/')
        with:
          files: addons.zip
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
